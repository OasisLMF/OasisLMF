# Workflow to remote call the PiWind output checks using
# a branch of oasislmf
#
# Inputs:
#   platform_version: The docker tag (OasisPlatfrom Release) to test the oasis stack with
#                     SemVar string of published docker images "1.26.4" ({n}.{n}.{n})
#                     default is "latest"
#
#   platform_branch: A branch of OasisPlatform to build images from [git ref]
#                    Takes precedence over platform_version when set.
#                    Builds coreoasis/github-actions:{server,worker} images from that branch
#                    and uses them as the base for the piwind worker/server images.
#
#   piwind_branch: The git reference (like branch name / Pull request) to run the PiWind tests from
#
name: Platform 2 - PiWind check

on:
  pull_request:
  push:
    branches:
      - main
      - stable**

  workflow_dispatch:
    inputs:
      platform_version:
        description: 'OasisPlatform 2 - Version to test [docker tag]'
        required: false
        default: latest
      platform_branch:
        description: 'OasisPlatform 2 - Branch to build images from [git ref]'
        required: false
        default: main
        type: string
      piwind_branch:
        description: 'Branch to run PiWind from [git ref]'
        required: true
      ods_branch:
        description: 'Build ods_tools package before test [git ref]'
        required: false
        type: string


jobs:
  check_images:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.platform_branch != '' }}
    runs-on: ubuntu-latest
    outputs:
      images_exist: ${{ steps.check.outputs.images_exist }}
      platform_sha: ${{ steps.check.outputs.platform_sha }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Check if platform images already exist
        id: check
        run: |
          PLATFORM_SHA=$(git ls-remote https://github.com/OasisLMF/OasisPlatform.git refs/heads/${{ inputs.platform_branch }} | cut -f1)
          echo "platform_sha=$PLATFORM_SHA" >> $GITHUB_OUTPUT
          if docker manifest inspect coreoasis/github-actions:model_worker-$PLATFORM_SHA > /dev/null 2>&1 && \
             docker manifest inspect coreoasis/github-actions:api_server-$PLATFORM_SHA > /dev/null 2>&1; then
            echo "images_exist=true" >> $GITHUB_OUTPUT
          else
            echo "images_exist=false" >> $GITHUB_OUTPUT
          fi

  build_platform:
    if: ${{ !failure() && !cancelled() && needs.check_images.outputs.images_exist != 'true' }}
    needs: [check_images]
    uses: OasisLMF/OasisPlatform/.github/workflows/build-images.yml@main
    secrets: inherit
    with:
      ignore_unfixed: 'true'
      cve_severity: 'SKIP'
      docker_push: 'true'
      checkout_ref: ${{ inputs.platform_branch || 'main' }}
      oasislmf_branch: ${{ github.ref_name }}
      ods_branch: ${{ inputs.ods_branch }}

  platform2:
    if: ${{ !failure() && !cancelled() }}
    needs: [check_images, build_platform]
    uses: OasisLMF/OasisPiWind/.github/workflows/integration.yml@main
    secrets: inherit
    with:
      piwind_branch: ${{ github.event_name != 'workflow_dispatch' && 'main' || inputs.piwind_branch }}
      oasislmf_branch: ${{ github.ref_name }}
      ods_branch: ${{ github.event_name != 'workflow_dispatch' && 'main' || inputs.ods_branch }}
      worker_image: ${{ github.event_name == 'workflow_dispatch' && inputs.platform_branch != '' && 'coreoasis/github-actions' || '' }}
      worker_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.platform_branch != '' && format('model_worker-{0}', needs.check_images.outputs.platform_sha) || github.event_name != 'workflow_dispatch' && '2.5' || inputs.platform_version }}
      server_image: ${{ github.event_name == 'workflow_dispatch' && inputs.platform_branch != '' && 'coreoasis/github-actions' || '' }}
      server_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.platform_branch != '' && format('api_server-{0}', needs.check_images.outputs.platform_sha) || github.event_name != 'workflow_dispatch' && '2.5' || inputs.platform_version }}
      debug_mode: '1'
      pytest_opts: "--docker-compose=./docker/plat2-v2.docker-compose.yml"
      worker_api_ver: 'v2'
      storage_suffix: '_platform2'
