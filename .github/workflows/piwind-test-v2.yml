# Workflow to remote call the PiWind output checks using
# a branch of oasislmf
#
# Inputs:
#   platform_branch: A branch of OasisPlatform to build images from [git ref]
#                    Defaults to 'main' on push/PR events.
#                    Builds coreoasis/github-actions:{server,worker} images from that branch
#                    and passes them directly to the integration tests.
#
#   piwind_branch: The git reference (like branch name / Pull request) to run the PiWind tests from
#
name: Platform 2 - PiWind check

on:
  pull_request:
  push:
    branches:
      - main
      - stable**

  workflow_dispatch:
    inputs:
      platform_branch:
        description: 'OasisPlatform 2 - Branch to build images from [git ref]'
        required: false
        default: main
        type: string
      piwind_branch:
        description: 'Branch to run PiWind from [git ref]'
        required: true
      ods_branch:
        description: 'Build ods_tools package before test [git ref]'
        required: false
        type: string


jobs:
  check_images:
    runs-on: ubuntu-latest
    outputs:
      images_exist: ${{ steps.check.outputs.images_exist }}
      platform_sha: ${{ steps.check.outputs.platform_sha }}
    steps:
      - name: Check if platform images already exist
        id: check
        run: |
          PLATFORM_SHA=$(git ls-remote https://github.com/OasisLMF/OasisPlatform.git refs/heads/${{ github.event_name != 'workflow_dispatch' && 'main' || inputs.platform_branch }} | cut -f1)
          echo "platform_sha=$PLATFORM_SHA" >> $GITHUB_OUTPUT
          if docker manifest inspect coreoasis/github-actions:model_worker-$PLATFORM_SHA > /dev/null 2>&1 && \
             docker manifest inspect coreoasis/github-actions:api_server-$PLATFORM_SHA > /dev/null 2>&1; then
            echo "images_exist=true" >> $GITHUB_OUTPUT
          else
            echo "images_exist=false" >> $GITHUB_OUTPUT
          fi

  build_platform:
    if: ${{ !failure() && !cancelled() && needs.check_images.outputs.images_exist != 'true' }}
    needs: [check_images]
    uses: OasisLMF/OasisPlatform/.github/workflows/build-images.yml@main
    secrets: inherit
    with:
      ignore_unfixed: 'true'
      cve_severity: 'SKIP'
      docker_push: 'true'
      checkout_ref: ${{ github.event_name != 'workflow_dispatch' && 'main' || inputs.platform_branch }}

  platform2:
    if: ${{ !failure() && !cancelled() }}
    needs: [check_images, build_platform]
    runs-on: ubuntu-latest
    env:
      DOCKERFILE_WORKER: 'docker/Dockerfile.piwind_worker'
      DOCKERFILE_SERVER: 'docker/Dockerfile.piwind_server'
      PIWIND_BRANCH: ${{ github.event_name != 'workflow_dispatch' && 'main' || inputs.piwind_branch }}
      SERVER_IMG: coreoasis/github-actions
      SERVER_TAG: api_server-${{ needs.check_images.outputs.platform_sha }}
      WORKER_IMG: coreoasis/github-actions
      WORKER_TAG: model_worker-${{ needs.check_images.outputs.platform_sha }}-oasislmf-${{ github.sha }}
      BASE_WORKER_TAG: model_worker-${{ needs.check_images.outputs.platform_sha }}
      WORKER_API_VER: v2
      DEBUG: 1
    steps:
      - name: Check if worker image exists
        id: check_worker_image
        run: |
          if docker manifest inspect "$WORKER_IMG:$WORKER_TAG" > /dev/null 2>&1; then
            echo "image_exists=true" >> $GITHUB_OUTPUT
          else
            echo "image_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Docker Hub credentials
        id: check_creds
        if: steps.check_worker_image.outputs.image_exists != 'true'
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "has_creds=true" >> $GITHUB_OUTPUT
          else
            echo "has_creds=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: steps.check_creds.outputs.has_creds == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build worker image with oasislmf branch
        if: steps.check_worker_image.outputs.image_exists != 'true'
        run: |
          cat > Dockerfile.patch << 'DOCKERFILE'
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE}
          ARG OASISLMF_BRANCH
          USER root
          RUN apt-get update && apt-get install -y --no-install-recommends gcc python3-dev && rm -rf /var/lib/apt/lists/*
          USER worker
          RUN pip uninstall oasislmf -y && \
              pip install --user --no-warn-script-location "git+https://github.com/OasisLMF/OasisLMF.git@${OASISLMF_BRANCH}#egg=oasislmf[extra]"
          ARG ODS_BRANCH
          RUN if [ ! -z "$ODS_BRANCH" ]; then \
              pip uninstall ods-tools -y && \
              pip install --user --no-warn-script-location "git+https://github.com/OasisLMF/ODS_Tools.git@${ODS_BRANCH}#egg=ods-tools"; \
            fi
          DOCKERFILE
          docker build \
            --build-arg BASE_IMAGE="$WORKER_IMG:$BASE_WORKER_TAG" \
            --build-arg OASISLMF_BRANCH="${{ github.ref }}" \
            --build-arg ODS_BRANCH="${{ inputs.ods_branch }}" \
            -t "$WORKER_IMG:$WORKER_TAG" \
            -f Dockerfile.patch .
          if [ "${{ steps.check_creds.outputs.has_creds }}" = "true" ]; then
            docker push "$WORKER_IMG:$WORKER_TAG"
          fi

      - name: Clone PiWind repository
        uses: actions/checkout@v3
        with:
          repository: OasisLMF/OasisPiWind
          ref: ${{ env.PIWIND_BRANCH }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install test deps
        run: |
          python -m pip install --upgrade "pip<23.3"
          pip install pip-tools
          wget $BASE_URL/$PIWIND_BRANCH/tests/requirements.in
          pip-compile requirements.in -o requirements.txt
          pip install -r requirements.txt
        env:
          BASE_URL: 'https://raw.githubusercontent.com/OasisLMF/OasisPiWind'

      - name: Reinstall oasislmf from branch
        run: |
          pip uninstall oasislmf -y
          pip install -v "git+https://git@github.com/OasisLMF/OasisLMF.git@${{ github.ref }}#egg=oasislmf[extra]"

      - name: Run Checks
        run: pytest -v --use-running-containers --docker-compose=./docker/plat2-v2.docker-compose.yml -k all_outputs

      - name: Create docker logs
        if: always()
        run: |
           mkdir -p docker_logs
           docker ps --format '{{.Names}}' | xargs -I CONTAINER bash -c "docker logs CONTAINER >> docker_logs/CONTAINER.log 2>&1"
           docker ps -aq | xargs -r docker stop
           docker ps -aq | xargs -r docker rm

      - name: Store docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs_platform2
          path: ./docker_logs
          retention-days: 3

      - name: Store result data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-tars_platform2
          path: ./tests/result/
          retention-days: 3
