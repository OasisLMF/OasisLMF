# Builds wheels for all non-Linux-x86_64 platforms plus slow platforms (aarch64).
# Not run on every PR — called by publish.yml at release time, smoke test workflows, or manually.
#
# Inputs:
#   platforms: string containing os/arch pairs to build, e.g. "windows-latest/AMD64,macos-14/arm64"
#              defaults to all platforms when called via workflow_dispatch or publish.yml

name: Oasislmf Build Extra Wheels

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (all if omitted)'
        required: false
        default: 'all'
        type: string
  workflow_call:
    inputs:
      platforms:
        description: 'Platforms to build (all if omitted)'
        required: false
        default: 'all'
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - id: filter
        run: |
          ALL='[{"os":"ubuntu-latest","archs":"aarch64"},{"os":"macos-14","archs":"x86_64"},{"os":"macos-14","archs":"arm64"},{"os":"windows-latest","archs":"AMD64"}]'
          PLATFORMS="${{ inputs.platforms }}"
          if [[ "$PLATFORMS" == "all" || -z "$PLATFORMS" ]]; then
            echo "matrix={\"include\":$(echo $ALL)}" >> $GITHUB_OUTPUT
          else
            FILTERED=$(python3 -c "
          import json, sys
          items = json.loads('$ALL')
          platforms = '$PLATFORMS'
          result = [i for i in items if i['os'] in platforms and i['archs'] in platforms]
          print(json.dumps({'include': result}))
          ")
            echo "matrix=$FILTERED" >> $GITHUB_OUTPUT
          fi

  build-extra-wheels:
    name: Build wheels (${{ matrix.os }} / ${{ matrix.archs }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU (aarch64)
      if: matrix.archs == 'aarch64'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.21.3
      env:
        CIBW_ARCHS: ${{ matrix.archs }}

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: oasislmf-wheels-${{ matrix.os }}-${{ matrix.archs }}
        path: ./wheelhouse/*.whl
        retention-days: 5
